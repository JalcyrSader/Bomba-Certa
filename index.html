<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomba Certa - Pro</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        header { text-align: center; margin: 10px 0 20px 0; }
        header h1 { color: var(--primary); margin: 0; font-size: 1.8rem; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; width: 100%; }
        .dash-card { background: var(--primary); color: white; padding: 12px; border-radius: 16px; text-align: center; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .dash-card.full { grid-column: span 2; background: #1e40af; }
        .dash-card span { display: block; font-size: 0.65rem; text-transform: uppercase; opacity: 0.9; font-weight: 700; margin-bottom: 4px; }
        .dash-card strong { font-size: 1.1rem; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 6px; color: #475569; }
        input { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 1rem; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .registro-item { background: var(--card); padding: 15px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .badge-consumo { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
        .btn-delete { color: #94a3b8; background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-delete svg { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>⛽ Bomba Certa</h1></header>
        <div class="dashboard">
            <div class="dash-card"><span>Gasto (Mês)</span><strong id="totalMes">R$ 0,00</strong></div>
            <div class="dash-card"><span>Litros (Mês)</span><strong id="litrosMes">0.00 L</strong></div>
            <div class="dash-card full"><span>Km Percorrida (Mês)</span><strong id="kmMes">0 Km</strong></div>
        </div>
        <div class="card">
            <div class="input-group"><label>KM ATUAL</label><input type="number" id="km" placeholder="00000" inputmode="numeric"></div>
            <div style="display: flex; gap: 10px;"><div class="input-group" style="flex: 1;"><label>LITROS</label><input type="number" id="litros" step="0.01" placeholder="0.00" inputmode="decimal"></div><div class="input-group" style="flex: 1;"><label>VALOR DO LITRO (R$)</label><input type="number" id="valorLitro" step="0.001" placeholder="0.00" inputmode="decimal"></div></div>
            <div class="input-group"><label>POSTO (OPCIONAL)</label><input type="text" id="posto" placeholder="Ex: Posto Ipiranga"></div>
            <button class="btn-save" onclick="salvarAbastecimento()">SALVAR REGISTRO</button>
        </div>
        <div id="listaRegistros"></div>
    </div>
    <script>
        let abastecimentos = JSON.parse(localStorage.getItem('bomba_certa_v3')) || [];
        let geoAtual = "";
        if (navigator.geolocation) { navigator.geolocation.getCurrentPosition(pos => { geoAtual = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`; }); }

        function salvarAbastecimento() {
            const km = parseFloat(document.getElementById('km').value);
            const litros = parseFloat(document.getElementById('litros').value);
            const valorL = parseFloat(document.getElementById('valorLitro').value) || 0;
            const posto = document.getElementById('posto').value || "Não informado";
            if (!km || !litros || !valorL) return alert("Preencha Km, Litros e Valor do Litro!");
            
            const valorTotal = litros * valorL;
            const agora = new Date();
            const mesAno = `${agora.getMonth() + 1}/${agora.getFullYear()}`;

            let consumo = 0;
            if (abastecimentos.length > 0) {
                const dist = km - abastecimentos[0].km;
                if (dist > 0) consumo = (dist / litros).toFixed(2);
            }

            abastecimentos.unshift({ id: Date.now(), data: agora.toLocaleDateString('pt-BR'), mesAno, km, litros, valorTotal, valorLitro: valorL, consumo, posto, geo: geoAtual });
            localStorage.setItem('bomba_certa_v3', JSON.stringify(abastecimentos));
            document.querySelectorAll('input').forEach(i => i.value = '');
            renderizar();
        }

        function excluirRegistro(id) {
            if (confirm("Excluir registro?")) {
                abastecimentos = abastecimentos.filter(i => i.id !== id);
                localStorage.setItem('bomba_certa_v3', JSON.stringify(abastecimentos));
                renderizar();
            }
        }

        function renderizar() {
            const container = document.getElementById('listaRegistros');
            const mesAtual = `${new Date().getMonth() + 1}/${new Date().getFullYear()}`;
            let tMes = 0, lMes = 0, kmsNoMes = [];
            container.innerHTML = '';

            abastecimentos.forEach(item => {
                if(item.mesAno === mesAtual) {
                    tMes += item.valorTotal;
                    lMes += item.litros;
                    kmsNoMes.push(item.km);
                }
                container.innerHTML += `
                    <div class="registro-item">
                        <div style="flex:1">
                            <span style="font-size:0.7rem;color:#64748b">${item.data}</span>
                            <div style="font-weight:700;font-size:1rem">${item.km.toLocaleString()} Km ${item.consumo > 0 ? `<span class="badge-consumo">${item.consumo} Km/L</span>` : ''}</div>
                            <div style="font-size:0.8rem;color:#475569"><strong>${item.posto}</strong> • ${item.litros}L (R$ ${item.valorLitro.toFixed(3)}/L)</div>
                            <div style="font-size:0.85rem;font-weight:700;color:var(--primary)">Total: R$ ${item.valorTotal.toFixed(2)}</div>
                        </div>
                        <button class="btn-delete" onclick="excluirRegistro(${item.id})"><svg viewBox="0 0 448 512"><path d="M135.2 17.7L128 32H32C14.3 32 0 46.3 0 64S14.3 96 32 96H416c17.7 0 32-14.3 32-32s-14.3-32-32-32H320l-7.2-14.3C307.4 6.8 296.3 0 284.2 0H163.8c-12.1 0-23.2 6.8-28.6 17.7zM416 128H32L53.2 467c1.6 25.3 22.6 45 47.9 45H346.9c25.3 0 46.3-19.7 47.9-45L416 128z"/></svg></button>
                    </div>`;
            });

            const kmTotal = kmsNoMes.length > 1 ? (Math.max(...kmsNoMes) - Math.min(...kmsNoMes)) : 0;
            document.getElementById('totalMes').innerText = `R$ ${tMes.toFixed(2)}`;
            document.getElementById('litrosMes').innerText = `${lMes.toFixed(2)} L`;
            document.getElementById('kmMes').innerText = `${kmTotal.toLocaleString()} Km`;
        }
        renderizar();
    </script>
</body>
</html>
